<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>共有Webページ一覧</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2933; background: #f6f7f8; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px 18px; }
    main { width: min(920px, 100%); }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 5vw, 44px); letter-spacing: 0; }
    p { margin: 0 0 28px; color: #5b6673; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    a { display: block; padding: 18px; border: 1px solid #d9dde3; border-radius: 8px; background: #fff; color: inherit; text-decoration: none; box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06); }
    a:hover { border-color: #9aa6b2; transform: translateY(-1px); }
    strong { display: block; font-size: 18px; margin-bottom: 6px; }
    span { color: #64707d; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>共有Webページ一覧</h1>
    <p>公開したいページを選んで開けます。</p>
    <div class="grid">
      <a href="./iwasaki-site/"><strong>Iwasaki Site</strong><span>総合サイト</span></a>
      <a href="./iwasaki-corporation/"><strong>Iwasaki Corporation</strong><span>企業ページ</span></a>
      <a href="./iwasaki-hotels/"><strong>Iwasaki Hotels</strong><span>ホテルページ</span></a>
      <a href="./kagoshima-air/"><strong>Kagoshima Air</strong><span>航空ページ</span></a>
      <a href="./kagoshima-island-ferry/"><strong>Kagoshima Island Ferry</strong><span>フェリーページ</span></a>
      <a href="./shiratsuyu-shuzo/"><strong>Shiratsuyu Shuzo</strong><span>酒造ページ</span></a>
    </div>
  </main>
</body>
</html>
